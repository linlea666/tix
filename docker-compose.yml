services:
  tix:
    build: .
    image: tix:latest
    container_name: tix
    restart: unless-stopped
    ports:
      - "${TIX_PORT:-8688}:8000"
    environment:
      TIX_AUTH_PASSWORD: "${TIX_AUTH_PASSWORD:-changeme}"
      TIX_LOG: "${TIX_LOG:-INFO}"
      TIX_DB: "/app/data/tix.db"
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request,sys
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status<500 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
